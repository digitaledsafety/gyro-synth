<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://unpkg.com https://cdn.tailwindcss.com https://d3js.org; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; img-src 'self' data:; connect-src 'self' https://unpkg.com https://d3js.org; font-src 'self';">
    <title>Gyro Synth</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/tone@14.8.49" integrity="sha384-c6Uo4N9c3SOEigMVzP6IshUG1wQ5uMp3xeoQFiHWAQ86joWdgyajkvopySyKy/Z6" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js" integrity="sha384-CjloA8y00+1SDAUkjs099PVfnY2KmDC2BZnws9kh8D/lX1s46w6EPhpXdqMfjK6i" crossorigin="anonymous"></script>
    <style>
      /* Custom styles to ensure full height and centering */
      html, body {
        height: 100%;
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: #2c3e50;
        overflow: hidden; /* Prevent scrolling */
        touch-action: none; /* Disable default touch actions for better multi-touch handling */
      }

      /* Full-screen SVG for visualization */
      #waveformSvg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #2c3e50;
        z-index: 1;
      }

      /* Settings Modal */
      #settingsModal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        display: none; /* Hidden by default */
        justify-content: center;
        align-items: center;
        z-index: 100;
        backdrop-filter: blur(4px);
        opacity: 0;
        transition: opacity 0.3s ease-in-out;
      }

      #settingsModal.visible {
        display: flex;
        opacity: 1;
      }

      #modalContent {
        background-color: white;
        padding: 2rem;
        border-radius: 1rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        width: 90%;
        max-width: 400px;
        position: relative;
      }

      #closeSettingsBtn {
        position: absolute;
        top: 0.75rem;
        right: 0.75rem;
        font-size: 1.5rem;
        line-height: 1;
        cursor: pointer;
        color: #666;
        background: transparent;
        border: none;
        padding: 0;
      }

      #closeSettingsBtn:hover {
        color: #000;
      }

      select {
        width: 100%;
        padding: 0.5rem;
        border-radius: 0.5rem;
        border: 1px solid #ccc;
        margin-bottom: 1rem;
        background-color: #f9f9f9;
      }

      .modal-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #4a5568;
        margin-bottom: 0.25rem;
      }

      /* Start Overlay */
    #startOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #2c3e50;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 200;
      color: white;
      text-align: center;
      padding: 20px;
    }

    #startButton {
      background-color: #3498db;
      color: white;
      padding: 15px 30px;
      font-size: 1.25rem;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.2s;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    #startButton:hover {
      background-color: #2980b9;
      transform: scale(1.05);
    }

      #startButton:active {
        transform: scale(0.95);
      }
    </style>
  </head>
  <body>
    <div id="startOverlay">
      <h1 class="text-4xl font-bold mb-4">Gyro Synth</h1>
      <p class="mb-8 text-lg opacity-80">Tilt your device to explore soundscapes.</p>
      <button id="startButton" aria-label="Start application and enable audio and motion sensors">Tap to Start</button>
      <p class="mt-8 text-xs opacity-50">Requires audio and motion sensor permissions.</p>
    </div>

    <svg id="waveformSvg" role="img" aria-label="Interactive Sound Waveform Visualizer"></svg>


    <div id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div id="modalContent" class="max-h-[90vh] overflow-y-auto">
        <button id="closeSettingsBtn" aria-label="Close settings">&times;</button>
        <h2 id="settingsTitle" class="text-xl font-bold mb-4 border-b pb-2">Settings</h2>

        <!-- Core Sound Section -->
        <div class="mb-6 border-b pb-4">
          <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">Core Sound</h3>

          <div class="mb-3 flex space-x-2">
            <div class="w-1/3">
              <label for="rootNoteSelect" class="modal-label">Root</label>
              <select id="rootNoteSelect" title="Select Root Note" aria-label="Select Root Note" class="mb-1">
                <option value="C">C</option>
                <option value="C#">C#</option>
                <option value="D">D</option>
                <option value="D#">D#</option>
                <option value="E">E</option>
                <option value="F">F</option>
                <option value="F#">F#</option>
                <option value="G">G</option>
                <option value="G#">G#</option>
                <option value="A">A</option>
                <option value="A#">A#</option>
                <option value="B">B</option>
              </select>
            </div>
            <div class="w-2/3">
              <label for="scaleSelect" class="modal-label">Scale</label>
              <select id="scaleSelect" title="Select Musical Scale" aria-label="Select Musical Scale" class="mb-1"></select>
            </div>
          </div>

          <div class="mb-3 flex space-x-2">
            <div class="w-1/2">
              <label for="synthTypeSelect" class="modal-label">Synth Type</label>
              <select id="synthTypeSelect" title="Select Synth Type" aria-label="Select Synth Type" class="mb-1">
                <option value="FMSynth">FM Synth</option>
                <option value="AMSynth">AM Synth</option>
                <option value="DuoSynth">Duo Synth</option>
                <option value="MonoSynth">Mono Synth</option>
              </select>
            </div>
            <div class="w-1/2">
              <label for="waveformSelect" class="modal-label">Waveform</label>
              <select id="waveformSelect" title="Select Waveform" aria-label="Select Waveform" class="mb-1">
                <option value="sine">Sine</option>
                <option value="square">Square</option>
                <option value="triangle">Triangle</option>
                <option value="sawtooth">Sawtooth</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="attackSlider" class="modal-label">Attack</label>
              <input type="range" id="attackSlider" aria-label="Synth Attack Time" min="0.01" max="2" step="0.01" value="0.1" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
            </div>
            <div>
              <label for="releaseSlider" class="modal-label">Release</label>
              <input type="range" id="releaseSlider" aria-label="Synth Release Time" min="0.1" max="5" step="0.1" value="0.5" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
            </div>
          </div>
        </div>

        <!-- Effects Section -->
        <div class="mb-6 border-b pb-4">
          <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">Effects</h3>

          <div class="grid grid-cols-2 gap-4 mb-3">
            <div>
              <label for="reverbWetSlider" class="modal-label">Reverb Wet</label>
              <input type="range" id="reverbWetSlider" aria-label="Reverb Wet Level" min="0" max="1" step="0.01" value="0.3" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
            </div>
            <div>
              <label for="reverbDecaySlider" class="modal-label">Reverb Decay</label>
              <input type="range" id="reverbDecaySlider" aria-label="Reverb Decay Time" min="0.5" max="10" step="0.1" value="2" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4 mb-3">
            <div>
              <label for="delayWetSlider" class="modal-label">Delay Wet</label>
              <input type="range" id="delayWetSlider" aria-label="Delay Wet Level" min="0" max="1" step="0.01" value="0.3" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
            </div>
            <div>
              <label for="delayTimeSelect" class="modal-label">Delay Time</label>
              <select id="delayTimeSelect" title="Select Delay Time" aria-label="Select Delay Time" class="mb-1">
                <option value="2n">Half Note (2n)</option>
                <option value="4n">Quarter Note (4n)</option>
                <option value="8n" selected>Eighth Note (8n)</option>
                <option value="16n">Sixteenth Note (16n)</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="filterCutoffSlider" class="modal-label">Filter Cutoff</label>
              <input type="range" id="filterCutoffSlider" aria-label="Filter Cutoff Frequency" min="100" max="20000" step="1" value="20000" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
            </div>
            <div>
              <label for="filterQSlider" class="modal-label">Filter Resonance (Q)</label>
              <input type="range" id="filterQSlider" aria-label="Filter Resonance Q" min="0.1" max="10" step="0.1" value="1" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
            </div>
          </div>
        </div>

        <!-- System Section -->
        <div class="mb-4">
          <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-3">System</h3>

          <div class="mb-3">
            <label for="visModeSelect" class="modal-label">Visualization Mode</label>
            <select id="visModeSelect" title="Select Visualization Mode" aria-label="Select Visualization Mode" class="w-full p-2 border border-gray-300 rounded-lg bg-gray-50 focus:ring-blue-500 focus:border-blue-500 mb-1">
              <option value="waveform">Waveform</option>
              <option value="frequency">Frequency</option>
            </select>
          </div>

          <div class="mb-4">
            <label for="volumeSlider" class="modal-label">Master Volume</label>
            <input type="range" id="volumeSlider" aria-label="Master Volume Level" min="0" max="1" step="0.01" value="0.8" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
          </div>

          <button id="clearAllBtn" aria-label="Clear All Sounds" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded transition-colors uppercase tracking-wider text-sm">
            Clear All Sounds
          </button>
        </div>

        <div id="frequencyDisplay" class="text-center text-sm text-gray-500 font-mono">0.00 Hz</div>

        <div class="mt-4 text-center space-x-2">
            <span id="betaDisplay" class="bg-yellow-400 text-black text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-tighter">Beta: 0.0°</span>
            <span id="gammaDisplay" class="bg-blue-400 text-white text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-tighter">Gamma: 0.0°</span>
        </div>
      </div>
    </div>

    <script src="js/AudioEngine.js"></script>
    <script src="js/Visualizer.js"></script>
    <script src="js/InteractionHandler.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
